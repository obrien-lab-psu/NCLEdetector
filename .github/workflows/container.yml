name: build-container

# Builds the Docker image (linux/amd64) and pushes it to GHCR, then builds a
# Singularity/Apptainer .sif from that same image so both containers have
# identical functionality. Runs on version tags and manual dispatch.
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

env:
  IMAGE: ghcr.io/obrien-lab-psu/entdetect

jobs:
  docker:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      version: ${{ steps.meta.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Image metadata (tags/labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=semver,pattern={{version}}
            type=raw,value=latest,enable={{is_default_branch}}
            type=ref,event=tag

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: container/Dockerfile
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  singularity:
    needs: docker
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Install Apptainer
        uses: eWaterCycle/setup-apptainer@v2
        with:
          apptainer-version: 1.3.4

      - name: Log in to GHCR (oras)
        run: echo "${{ secrets.GITHUB_TOKEN }}" | apptainer registry login --username ${{ github.actor }} --password-stdin oras://ghcr.io

      - name: Build .sif from the pushed Docker image
        run: apptainer build entdetect.sif docker://${{ env.IMAGE }}:${{ needs.docker.outputs.version }}

      - name: Push .sif to GHCR (OCI artifact)
        run: apptainer push entdetect.sif oras://${{ env.IMAGE }}-sif:${{ needs.docker.outputs.version }}
